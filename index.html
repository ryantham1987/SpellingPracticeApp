<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#4f46e5" />
<title>Spelling Practice</title>
<style>
  :root {
    --bg: #eef2ff;
    --card: #ffffff;
    --primary: #4f46e5;
    --primary-dark: #3730a3;
    --accent: #f59e0b;
    --green: #16a34a;
    --red: #dc2626;
    --text: #1e293b;
    --muted: #64748b;
    --shadow: 0 4px 14px rgba(30, 41, 59, 0.12);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
      "Microsoft YaHei", sans-serif;
    min-height: 100%;
  }

  body { padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--primary);
    color: #fff;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
  }
  header h1 { font-size: 1.15rem; margin: 0; font-weight: 700; }

  .nav-btn {
    background: rgba(255, 255, 255, 0.18);
    border: none;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: 999px;
    cursor: pointer;
  }
  .nav-btn:active { background: rgba(255, 255, 255, 0.32); }

  main { padding: 16px; max-width: 900px; margin: 0 auto; }
  .view { display: none; }
  .view.active { display: block; }

  /* ---------- Practice grid ---------- */
  .controls { display: flex; gap: 10px; margin-bottom: 14px; }
  .ctrl-btn {
    flex: 1;
    border: none;
    border-radius: 12px;
    padding: 13px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    background: var(--card);
    color: var(--primary);
    box-shadow: var(--shadow);
  }
  .ctrl-btn:active { transform: scale(0.97); }
  .ctrl-btn.active { background: var(--primary); color: #fff; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--card);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    min-height: 168px;
  }

  .word-slot {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    border-radius: 12px;
    background: #f1f5f9;
    font-weight: 700;
    color: var(--muted);
    min-height: 58px;
    padding: 6px;
    word-break: break-word;
    line-height: 1.2;
  }
  .word-slot.revealed {
    background: #ecfdf5;
    color: var(--green);
    font-size: 1.5rem;
  }
  .word-slot .num { font-size: 1.6rem; opacity: 0.4; }
  .lang-tag {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .btn-row { display: flex; gap: 8px; width: 100%; }
  .action-btn {
    flex: 1;
    border: none;
    border-radius: 12px;
    padding: 12px 4px;
    font-size: 1.4rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    transition: transform 0.06s ease;
  }
  .action-btn:active { transform: scale(0.92); }
  .read-btn { background: var(--accent); color: #fff; }
  .reveal-btn { background: var(--primary); color: #fff; }
  .read-btn.speaking { animation: pulse 0.7s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.55; } }

  /* ---------- Admin ---------- */
  .panel {
    background: var(--card);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 18px;
    margin-bottom: 16px;
  }
  .panel h2 { margin: 0 0 14px; font-size: 1.05rem; }

  .field { margin-bottom: 12px; }
  label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  input[type="text"], select {
    width: 100%;
    padding: 13px 14px;
    font-size: 1.05rem;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    background: #fff;
    color: var(--text);
  }
  input[type="text"]:focus, select:focus { outline: none; border-color: var(--primary); }

  .lang-choice { display: flex; gap: 6px; }
  .lang-choice button {
    flex: 1;
    padding: 11px 4px;
    border: 2px solid #e2e8f0;
    background: #fff;
    border-radius: 12px;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
  }
  .lang-choice button.selected {
    border-color: var(--primary);
    background: var(--primary);
    color: #fff;
  }

  .primary-btn {
    width: 100%;
    padding: 15px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
  }
  .primary-btn:active { opacity: 0.85; }

  .word-list { list-style: none; margin: 0; padding: 0; }
  .word-list li {
    padding: 12px 4px;
    border-bottom: 1px solid #eef2f7;
  }
  .word-list li:last-child { border-bottom: none; }
  .w-row { display: flex; align-items: center; gap: 10px; }
  .w-index { color: var(--muted); font-weight: 700; font-size: 0.9rem; min-width: 22px; }
  .word-list .w-text { flex: 1; font-weight: 600; font-size: 1.05rem; word-break: break-word; }
  .word-list .w-lang {
    font-size: 0.7rem;
    background: #eef2ff;
    color: var(--primary);
    padding: 3px 8px;
    border-radius: 999px;
    text-transform: uppercase;
    font-weight: 700;
    white-space: nowrap;
  }
  .w-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .icon-btn {
    border: 1px solid #e2e8f0;
    background: #fff;
    font-size: 1.15rem;
    cursor: pointer;
    padding: 8px 13px;
    border-radius: 10px;
    line-height: 1;
  }
  .icon-btn:active { background: #f1f5f9; }
  .icon-btn:disabled { opacity: 0.35; cursor: default; }
  .del-btn { color: var(--red); border-color: #fecaca; }

  .edit-box { display: flex; flex-direction: column; gap: 10px; }
  .edit-actions { display: flex; gap: 8px; }
  .edit-actions button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 0.98rem;
    font-weight: 700;
    cursor: pointer;
  }
  .save-btn { background: var(--green); color: #fff; }
  .cancel-btn { background: #e2e8f0; color: var(--text); }

  .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 1rem; }
  .empty .big { font-size: 2.4rem; display: block; margin-bottom: 8px; }

  .clear-link {
    display: block;
    text-align: center;
    color: var(--red);
    background: none;
    border: none;
    font-size: 0.9rem;
    margin: 4px auto 0;
    cursor: pointer;
    text-decoration: underline;
  }

  .hint { font-size: 0.82rem; color: var(--muted); margin: 6px 0 0; }
</style>
</head>
<body>
<header>
  <h1 id="title">🐝 Spelling Practice</h1>
  <button class="nav-btn" id="navBtn">⚙️ Admin</button>
</header>

<main>
  <!-- ============ PRACTICE VIEW ============ -->
  <section id="practiceView" class="view active">
    <div id="orderControls" class="controls" style="display:none">
      <button id="inOrderBtn" class="ctrl-btn active">🔢 In order</button>
      <button id="shuffleBtn" class="ctrl-btn">🔀 Shuffle</button>
    </div>
    <div id="practiceControls" class="controls" style="display:none">
      <button id="showAllBtn" class="ctrl-btn">👁️ Show all</button>
      <button id="hideAllBtn" class="ctrl-btn">🙈 Hide all</button>
    </div>
    <div id="practiceGrid" class="grid"></div>
    <div id="practiceEmpty" class="empty" style="display:none">
      <span class="big">📝</span>
      No words yet!<br />Tap <strong>⚙️ Admin</strong> to add spelling words.
    </div>
  </section>

  <!-- ============ ADMIN VIEW ============ -->
  <section id="adminView" class="view">
    <div class="panel">
      <h2>Add a word</h2>
      <div class="field">
        <label for="wordInput">Word</label>
        <input type="text" id="wordInput" placeholder="e.g. elephant  or  苹果" autocomplete="off" />
      </div>
      <div class="field">
        <label>Language</label>
        <div class="lang-choice">
          <button type="button" data-lang="en" class="selected">🇬🇧 English</button>
          <button type="button" data-lang="zh">🇨🇳 中文</button>
          <button type="button" data-lang="ms">🇲🇾 Melayu</button>
        </div>
      </div>
      <button class="primary-btn" id="addBtn">➕ Add word</button>
      <p class="hint">Tip: type the word and press Enter to add it quickly.</p>
    </div>

    <div class="panel">
      <h2>Word list (<span id="count">0</span>)</h2>
      <ul class="word-list" id="wordList"></ul>
      <div id="listEmpty" class="empty" style="display:none">No words added yet.</div>
      <button class="clear-link" id="clearBtn" style="display:none">Clear all words</button>
    </div>
  </section>
</main>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "spelling_words_v1";
  var words = load();
  var adminLang = "en";
  var editingIndex = -1;

  /* ---------- supported languages ---------- */
  var LANGS = {
    en: { label: "English", short: "EN", chip: "🇬🇧 English", speak: "en-GB", voice: ["en-gb", "en-us", "en-"] },
    zh: { label: "中文", short: "中文", chip: "🇨🇳 中文", speak: "zh-CN", voice: ["zh-cn", "zh-hans", "zh-", "zh"] },
    ms: { label: "Melayu", short: "BM", chip: "🇲🇾 Melayu", speak: "ms-MY", voice: ["ms-my", "ms-", "id-id", "id-"] }
  };
  function langOf(code) { return LANGS[code] || LANGS.en; }

  /* ---------- storage ---------- */
  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
  }
  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(words)); } catch (e) {}
  }

  /* ---------- text to speech ---------- */
  var voices = [];
  function refreshVoices() { voices = window.speechSynthesis ? speechSynthesis.getVoices() : []; }
  if (window.speechSynthesis) {
    refreshVoices();
    speechSynthesis.onvoiceschanged = refreshVoices;
  }

  function pickVoice(lang) {
    if (!voices.length) refreshVoices();
    var wanted = langOf(lang).voice;
    for (var w = 0; w < wanted.length; w++) {
      for (var i = 0; i < voices.length; i++) {
        var vl = (voices[i].lang || "").toLowerCase();
        if (vl.indexOf(wanted[w]) === 0 || vl === wanted[w].replace(/-$/, "")) return voices[i];
      }
    }
    return null;
  }

  function speak(text, lang, btn) {
    if (!window.speechSynthesis) {
      alert("Sorry, this browser can't read words aloud.");
      return;
    }
    speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(text);
    u.lang = langOf(lang).speak;
    var v = pickVoice(lang);
    if (v) u.voice = v;
    u.rate = 0.8;
    u.pitch = 1;
    if (btn) {
      btn.classList.add("speaking");
      u.onend = u.onerror = function () { btn.classList.remove("speaking"); };
    }
    speechSynthesis.speak(u);
  }

  /* ---------- practice view ---------- */
  var grid = document.getElementById("practiceGrid");
  var practiceEmpty = document.getElementById("practiceEmpty");
  var practiceControls = document.getElementById("practiceControls");
  var orderControls = document.getElementById("orderControls");
  var inOrderBtn = document.getElementById("inOrderBtn");
  var shuffleBtn = document.getElementById("shuffleBtn");

  var randomMode = false;
  var randomIndices = null;

  function shuffledIndices(n) {
    var a = [];
    for (var i = 0; i < n; i++) a.push(i);
    for (var k = n - 1; k > 0; k--) {
      var j = Math.floor(Math.random() * (k + 1));
      var t = a[k];
      a[k] = a[j];
      a[j] = t;
    }
    return a;
  }

  function displayList() {
    if (!randomMode) return words.slice();
    if (!randomIndices || randomIndices.length !== words.length) {
      randomIndices = shuffledIndices(words.length);
    }
    return randomIndices.map(function (i) { return words[i]; });
  }

  function hideSlot(slot) {
    slot.classList.remove("revealed");
    slot.innerHTML = '<span class="num">' + slot.dataset.num + "</span>";
  }
  function revealSlot(slot) {
    slot.classList.add("revealed");
    slot.textContent = slot.dataset.word;
  }

  function renderPractice() {
    grid.innerHTML = "";
    if (!words.length) {
      practiceEmpty.style.display = "block";
      practiceControls.style.display = "none";
      orderControls.style.display = "none";
      return;
    }
    practiceEmpty.style.display = "none";
    practiceControls.style.display = "flex";
    orderControls.style.display = "flex";
    inOrderBtn.classList.toggle("active", !randomMode);
    shuffleBtn.classList.toggle("active", randomMode);

    displayList().forEach(function (word, idx) {
      var card = document.createElement("div");
      card.className = "card";

      var slot = document.createElement("div");
      slot.className = "word-slot";
      slot.dataset.num = idx + 1;
      slot.dataset.word = word.text;
      hideSlot(slot);

      var tag = document.createElement("div");
      tag.className = "lang-tag";
      tag.textContent = langOf(word.lang).label;

      var row = document.createElement("div");
      row.className = "btn-row";

      var readBtn = document.createElement("button");
      readBtn.className = "action-btn read-btn";
      readBtn.title = "Read the word";
      readBtn.textContent = "🔊";
      readBtn.addEventListener("click", function () { speak(word.text, word.lang, readBtn); });

      var revealBtn = document.createElement("button");
      revealBtn.className = "action-btn reveal-btn";
      revealBtn.title = "Show / hide the word";
      revealBtn.textContent = "👁️";
      revealBtn.addEventListener("click", function () {
        if (slot.classList.contains("revealed")) hideSlot(slot);
        else revealSlot(slot);
      });

      row.appendChild(readBtn);
      row.appendChild(revealBtn);
      card.appendChild(slot);
      card.appendChild(tag);
      card.appendChild(row);
      grid.appendChild(card);
    });
  }

  inOrderBtn.addEventListener("click", function () {
    randomMode = false;
    renderPractice();
  });
  shuffleBtn.addEventListener("click", function () {
    randomMode = true;
    randomIndices = shuffledIndices(words.length); // reshuffle each tap
    renderPractice();
  });

  document.getElementById("showAllBtn").addEventListener("click", function () {
    [].forEach.call(grid.querySelectorAll(".word-slot"), revealSlot);
  });
  document.getElementById("hideAllBtn").addEventListener("click", function () {
    [].forEach.call(grid.querySelectorAll(".word-slot"), hideSlot);
  });

  /* ---------- admin view ---------- */
  var wordInput = document.getElementById("wordInput");
  var addBtn = document.getElementById("addBtn");
  var wordList = document.getElementById("wordList");
  var listEmpty = document.getElementById("listEmpty");
  var clearBtn = document.getElementById("clearBtn");
  var countEl = document.getElementById("count");
  var langButtons = document.querySelectorAll(".lang-choice button");

  langButtons.forEach(function (b) {
    b.addEventListener("click", function () {
      adminLang = b.getAttribute("data-lang");
      langButtons.forEach(function (x) { x.classList.remove("selected"); });
      b.classList.add("selected");
    });
  });

  function addWord() {
    var text = wordInput.value.trim();
    if (!text) return;
    words.push({ text: text, lang: adminLang });
    editingIndex = -1;
    save();
    wordInput.value = "";
    wordInput.focus();
    renderAdmin();
    renderPractice();
  }

  addBtn.addEventListener("click", addWord);
  wordInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") { e.preventDefault(); addWord(); }
  });

  clearBtn.addEventListener("click", function () {
    if (confirm("Delete ALL words?")) {
      words = [];
      save();
      renderAdmin();
      renderPractice();
    }
  });

  function iconBtn(label, title, handler) {
    var b = document.createElement("button");
    b.className = "icon-btn";
    b.textContent = label;
    b.title = title;
    b.addEventListener("click", handler);
    return b;
  }

  function move(idx, dir) {
    var j = idx + dir;
    if (j < 0 || j >= words.length) return;
    var tmp = words[idx];
    words[idx] = words[j];
    words[j] = tmp;
    editingIndex = -1;
    save();
    renderAdmin();
    renderPractice();
  }

  function buildViewRow(word, idx) {
    var frag = document.createDocumentFragment();

    var row = document.createElement("div");
    row.className = "w-row";

    var num = document.createElement("span");
    num.className = "w-index";
    num.textContent = idx + 1 + ".";

    var text = document.createElement("span");
    text.className = "w-text";
    text.textContent = word.text;

    var lang = document.createElement("span");
    lang.className = "w-lang";
    lang.textContent = langOf(word.lang).short;

    row.appendChild(num);
    row.appendChild(text);
    row.appendChild(lang);

    var actions = document.createElement("div");
    actions.className = "w-actions";

    var listen = iconBtn("🔊", "Preview", function () { speak(word.text, word.lang); });
    var edit = iconBtn("✏️", "Edit", function () { editingIndex = idx; renderAdmin(); });
    var up = iconBtn("⬆️", "Move up", function () { move(idx, -1); });
    up.disabled = idx === 0;
    var down = iconBtn("⬇️", "Move down", function () { move(idx, 1); });
    down.disabled = idx === words.length - 1;
    var del = iconBtn("🗑️", "Delete", function () {
      words.splice(idx, 1);
      editingIndex = -1;
      save();
      renderAdmin();
      renderPractice();
    });
    del.classList.add("del-btn");

    actions.appendChild(listen);
    actions.appendChild(edit);
    actions.appendChild(up);
    actions.appendChild(down);
    actions.appendChild(del);

    frag.appendChild(row);
    frag.appendChild(actions);
    return frag;
  }

  function buildEditRow(word, idx) {
    var box = document.createElement("div");
    box.className = "edit-box";
    var editLang = word.lang;

    var input = document.createElement("input");
    input.type = "text";
    input.value = word.text;

    var langChoice = document.createElement("div");
    langChoice.className = "lang-choice";
    var langBtns = {};
    function syncLang() {
      Object.keys(langBtns).forEach(function (code) {
        langBtns[code].classList.toggle("selected", editLang === code);
      });
    }
    Object.keys(LANGS).forEach(function (code) {
      var b = document.createElement("button");
      b.type = "button";
      b.textContent = LANGS[code].chip;
      b.addEventListener("click", function () { editLang = code; syncLang(); });
      langBtns[code] = b;
      langChoice.appendChild(b);
    });
    syncLang();

    function commit() {
      var t = input.value.trim();
      if (!t) return;
      words[idx] = { text: t, lang: editLang };
      editingIndex = -1;
      save();
      renderAdmin();
      renderPractice();
    }

    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") { e.preventDefault(); commit(); }
    });

    var actions = document.createElement("div");
    actions.className = "edit-actions";
    var saveB = document.createElement("button");
    saveB.className = "save-btn";
    saveB.textContent = "✓ Save";
    saveB.addEventListener("click", commit);
    var cancelB = document.createElement("button");
    cancelB.className = "cancel-btn";
    cancelB.textContent = "✕ Cancel";
    cancelB.addEventListener("click", function () { editingIndex = -1; renderAdmin(); });
    actions.appendChild(saveB);
    actions.appendChild(cancelB);

    box.appendChild(input);
    box.appendChild(langChoice);
    box.appendChild(actions);

    setTimeout(function () { input.focus(); }, 0);
    return box;
  }

  function renderAdmin() {
    wordList.innerHTML = "";
    countEl.textContent = words.length;
    if (!words.length) {
      listEmpty.style.display = "block";
      clearBtn.style.display = "none";
      editingIndex = -1;
      return;
    }
    listEmpty.style.display = "none";
    clearBtn.style.display = "block";

    words.forEach(function (word, idx) {
      var li = document.createElement("li");
      li.appendChild(idx === editingIndex ? buildEditRow(word, idx) : buildViewRow(word, idx));
      wordList.appendChild(li);
    });
  }

  /* ---------- navigation ---------- */
  var practiceView = document.getElementById("practiceView");
  var adminView = document.getElementById("adminView");
  var navBtn = document.getElementById("navBtn");
  var title = document.getElementById("title");
  var onAdmin = false;

  function switchView() {
    onAdmin = !onAdmin;
    if (onAdmin) {
      practiceView.classList.remove("active");
      adminView.classList.add("active");
      navBtn.textContent = "🐝 Practice";
      title.textContent = "⚙️ Admin";
      renderAdmin();
    } else {
      adminView.classList.remove("active");
      practiceView.classList.add("active");
      navBtn.textContent = "⚙️ Admin";
      title.textContent = "🐝 Spelling Practice";
      renderPractice();
    }
    window.scrollTo(0, 0);
  }
  navBtn.addEventListener("click", switchView);

  /* ---------- init ---------- */
  renderPractice();
})();
</script>
</body>
</html>
